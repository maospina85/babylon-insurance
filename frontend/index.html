<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Babylon Custom Insurance — Diseña tu seguro a medida" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Babylon Custom Insurance" />
    <meta property="og:description" content="Diseña tu seguro personalizado con las coberturas que necesitas" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>Babylon Custom Insurance</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body { min-height: 100vh; -webkit-font-smoothing: antialiased; }
      #root { min-height: 100vh; }
      :focus-visible { outline: 3px solid #2B5BF5 !important; outline-offset: 2px !important; }
      details > summary { list-style: none; }
      details > summary::-webkit-details-marker { display: none; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes fadeInScale { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
      @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
      @keyframes checkPop { 0% { transform: scale(0); opacity: 0; } 70% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
